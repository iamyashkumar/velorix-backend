# Server
server.port=${PORT:8080}

# MongoDB Atlas (fallback to local MongoDB if no env variable)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/velorix}
spring.data.mongodb.database=${MONGODB_DATABASE:velorix}

# JWT (fallback to a default secret for local testing)
jwt.secret=${JWT_SECRET:mySuperSecretKeyForVelorixProject2024MakeItAtLeast32CharsLong}
jwt.expiration.ms=86400000

# Logging
logging.level.com.velorix.backend=INFO

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:yashkanha21@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Groq AI API
groq.api.key=${GROQ_API_KEY}